name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff
        run: poetry run ruff check .
      - name: Mypy
        run: poetry run mypy app
      - name: Pytest
        run: poetry run pytest -q

  scanner:
    name: scanner (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scanner
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff
        run: poetry run ruff check .
      - name: Mypy
        run: poetry run mypy app
      - name: Pytest
        run: poetry run pytest -q

  web:
    name: web (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
